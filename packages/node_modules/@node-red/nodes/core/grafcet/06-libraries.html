<script type="text/javascript">
    RED.nodes.registerType('Libraries', {
        category: 'GRAFCET',
        color: '#C0C0DC',
        defaults: {
            name: { value: "Libraries" },
            arduinoJson: { value: false },
            dfplayer: { value: false },
            ds18b20: { value: false },
            eeprom: { value: false },
            keypad: { value: false },
            lcdI2c: { value: false },
            neoPixel: { value: false },
            oneWire: { value: false },
            rc522: { value: false },
            rcSwitch: { value: false },
            servo: { value: false },
            softwareSerial: { value: false },
            tm1637: { value: false },
            wdt: { value: false }
        },
        inputs: 0,
        outputs: 0,
        icon: "font-awesome/fa-book",
        label: function() {
            var libs = ["arduinoJson","dfplayer","ds18b20","eeprom","keypad","lcdI2c","neoPixel","oneWire","rc522","rcSwitch","servo","softwareSerial","tm1637","wdt"];
            var n = 0;
            libs.forEach(function(k) { if (this[k]) n++; }.bind(this));
            return "Libraries(" + n + ")";
        }
    });
</script>
