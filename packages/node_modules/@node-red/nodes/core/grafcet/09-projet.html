<script type="text/javascript">
    RED.nodes.registerType('projet', {
        category: 'GRAFCET',
        color: '#FFFFFF',
        defaults: {
            name: { value: "" },
            description: { value: "" }
        },
        inputs: 0,
        outputs: 0,
        icon: "font-awesome/fa-support",
        align: "left",
        label: function() {
            return this.name || "Projet";
        },
        labelStyle: function() {
            return this.name ? "node_label_italic" : "";
        },
        oneditprepare: function() {
            this.editor = RED.editor.createEditor({
                id: 'node-input-description-editor',
                mode: 'ace/mode/text',
                value: $("#node-input-description").val()
            });
        },
        oneditsave: function() {
            $("#node-input-description").val(this.editor.getValue());
            this.editor.destroy();
            delete this.editor;
        },
        oneditcancel: function() {
            this.editor.destroy();
            delete this.editor;
        }
    });
</script>

<script type="text/html" data-template-name="projet">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Nom</label>
        <input type="text" id="node-input-name" placeholder="Nom du projet">
    </div>
    <input type="hidden" id="node-input-description">
    <div class="form-row node-text-editor-row">
        <div style="height: 420px; min-height: 150px; border: 1px solid #ccc;" class="node-text-editor" id="node-input-description-editor"></div>
    </div>
</script>

<script type="text/html" data-help-name="projet">
    <p>Nœud <strong>Projet</strong> dans la catégorie <strong>GRAFCET</strong>.</p>
    <h3>Détails</h3>
    <dl class="message-properties">
        <dt>Nom</dt>
        <dd>Le nom du projet.</dd>
        <dt>Description</dt>
        <dd>Éditeur de code intégré pour la description du projet.</dd>
    </dl>
</script>
