<script type="text/javascript">
    RED.nodes.registerType('action',{
        category: 'GRAFCET', // Modifié de 'function' à 'GRAFCET'
        color: '#C7E9C0',
        defaults: {
            name: {value: ""}, 
            action1: {value: ""},
            action2: {value: ""},
            action3: {value: ""},
            action4: {value: ""},
            action5: {value: ""},
            action6: {value: ""},
            action7: {value: ""},
            action8: {value: ""},
            action9: {value: ""}
        },
        inputs: 1,
        outputs: 0, 
        icon: "font-awesome/fa-angle-right",
        label: function() {
            var count = 0;
            for (var i = 1; i <= 9; i++) {
                if (this["action" + i] && this["action" + i].trim() !== "") {
                    count++;
                }
            }
            var displayName = this.name || "Action";
            return displayName + " (" + count + ")";
        }
    });
</script>

<script type="text/html" data-template-name="action">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Description</label>
        <input type="text" id="node-input-name" placeholder="Description">
    </div>
    
    <div class="form-row" style="margin-top: 20px;">
        <label for="node-input-action1"><i class="fa fa-bolt"></i> Action 1</label>
        <input type="text" id="node-input-action1">
    </div>
    <div class="form-row">
        <label for="node-input-action2"><i class="fa fa-bolt"></i> Action 2</label>
        <input type="text" id="node-input-action2">
    </div>
    <div class="form-row">
        <label for="node-input-action3"><i class="fa fa-bolt"></i> Action 3</label>
        <input type="text" id="node-input-action3">
    </div>
    <div class="form-row">
        <label for="node-input-action4"><i class="fa fa-bolt"></i> Action 4</label>
        <input type="text" id="node-input-action4">
    </div>
    <div class="form-row">
        <label for="node-input-action5"><i class="fa fa-bolt"></i> Action 5</label>
        <input type="text" id="node-input-action5">
    </div>
    <div class="form-row">
        <label for="node-input-action6"><i class="fa fa-bolt"></i> Action 6</label>

    <div class="form-row">

</script>
