<script type="text/javascript">
    RED.nodes.registerType('entrees', {
        category: 'GRAFCET',
        color: '#DAC4B4',
        defaults: {
            name: { value: "" },
            elements: { value: "[]" }
        },
        inputs: 0,
        outputs: 0,
        icon: "font-awesome/fa-flash",
        align: "left",
        label: function() {
            var n = 0;
            try { n = JSON.parse(this.elements || "[]").length; } catch(e) {}
            return "Entrees(" + n + ")";
        },
        oneditprepare: function() {
            var node = this;

            var parsedElements = [];
            try { parsedElements = JSON.parse(node.elements || "[]"); } catch(e) { parsedElements = []; }

            $("#node-input-elements-list").editableList({
                addButton: "Ajouter",
                removable: true,
                sortable: ".red-ui-editableList-sortable-handle",
                addItem: function(row, index, data) {
                    var container = $('<div style="display:flex; align-items:center; gap:8px; width:100%;"></div>').appendTo(row);

                    $('<span class="red-ui-editableList-sortable-handle" style="cursor:move; margin-right:4px;"><i class="fa fa-bars"></i></span>').appendTo(container);

                    $('<label style="width:auto; min-width:40px; margin:0;">Nom</label>').appendTo(container);
                    var inputNom = $('<input type="text" style="width:70%; padding:4px;" placeholder="Nom">').appendTo(container);
                    if (data.nom) { inputNom.val(data.nom); }

                    $('<label style="width:auto; min-width:30px; margin:0;">Pin</label>').appendTo(container);
                    var inputPin = $('<input type="text" style="width:30%; padding:4px;" placeholder="Pin">').appendTo(container);
                    if (data.pin) { inputPin.val(data.pin); }
                },
                removeItem: function(data) {}
            });

            $("#node-input-elements-list").parent().css("width", "100%");

            parsedElements.forEach(function(el) {
                $("#node-input-elements-list").editableList("addItem", el);
            });
        },
        oneditsave: function() {
            var elements = [];
            $("#node-input-elements-list").editableList("items").each(function(index) {
                var row = $(this);
                var nom = row.find("input:eq(0)").val().trim();
                var pin = row.find("input:eq(1)").val().trim();
                if (nom !== "" || pin !== "") {
                    elements.push({ nom: nom, pin: pin });
                }
            });
            $("#node-input-elements").val(JSON.stringify(elements));
        }
    });
</script>

<script type="text/html" data-template-name="entrees">
    <input type="hidden" id="node-input-name">
    <input type="hidden" id="node-input-elements">
    <div id="node-input-elements-list" style="width:100%;"></div>
</script>

<script type="text/html" data-help-name="entrees">
    <p>Nœud <strong>Entrees</strong> dans la catégorie <strong>GRAFCET</strong>.</p>
    <h3>Détails</h3>
    <p>Permet de définir une liste d'entrées. Chaque entrée est composée de :</p>
    <ul>
        <li><strong>Nom</strong> : le nom de l'entrée</li>
        <li><strong>Pin</strong> : le numéro de pin associé</li>
    </ul>
    <p>Utilisez le bouton <strong>Ajouter</strong> pour créer de nouveaux éléments.</p>
    <p>Glissez-déposez les lignes pour réordonner les éléments.</p>
</script>
