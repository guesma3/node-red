<script type="text/javascript">
    RED.nodes.registerType('insert-code', {
        category: 'GRAFCET', // Catégorie GRAFCET [cite: 18]
        color: '#C0C0DC', // Couleur violet clair [cite: 1, 3]
        defaults: {
            name: { value: "" },
            emplacement: { value: "Variables" },
            code: { value: "" }
        },
        inputs: 0, // 0 entrée [cite: 1, 3]
        outputs: 0, // 0 sortie [cite: 1, 3]
        icon: function() {
            switch (this.emplacement) {
                case "Variables":
                    return "font-awesome/fa-database";
                case "SetupUp":
                    return "font-awesome/fa-arrow-up";
                case "SetupDown":
                    return "font-awesome/fa-arrow-down";
                case "LoopUp":
                    return "font-awesome/fa-repeat";
                case "LoopDown":
                    return "font-awesome/fa-undo";
                case "Functions":
                    return "font-awesome/fa-code";
                case "define":
                    return "font-awesome/fa-terminal";
                default:
                    return "font-awesome/fa-code";
            }
        },
        label: function() {
            // Le label prend le nom de l'emplacement choisi [cite: 1, 3, 13]
            return this.emplacement || "Insert Code";
        },
        labelStyle: function() {
            return this.name ? "node_label_italic" : "";
        },
        oneditprepare: function() {
            // Initialisation de l'éditeur intégré de Node-RED (C++) [cite: 26, 28]
            this.editor = RED.editor.createEditor({
                id: 'node-input-code-editor',
                mode: 'ace/mode/c_cpp',
                value: $("#node-input-code").val()
            });
        },
        oneditsave: function() {
            // Sauvegarde du code saisi dans le champ caché [cite: 28, 29]
            $("#node-input-code").val(this.editor.getValue());
            this.editor.destroy();
            delete this.editor;
        },
        oneditcancel: function() {
            this.editor.destroy();
            delete this.editor;
        }
    });
</script>

<script type="text/html" data-template-name="insert-code">
    <div class="form-row">
        <label for="node-input-emplacement"><i class="fa fa-map-marker"></i> Emplacement</label>
        <select id="node-input-emplacement" style="width:70%;">
            <option value="Variables">Variables</option>
            <option value="Functions">Functions</option>
            <option value="SetupUp">SetupUp</option>
            <option value="SetupDown">SetupDown</option>
            <option value="LoopUp">LoopUp</option>
            <option value="LoopDown">LoopDown</option>
            <option value="define">define</option>
        </select>
    </div>

    <input type="hidden" id="node-input-code">

    <div class="form-row node-text-editor-row">
        <div style="height: 420px; min-height: 150px; border: 1px solid #ccc;" class="node-text-editor" id="node-input-code-editor"></div>
    </div>
</script>

<script type="text/html" data-help-name="insert-code">
    <p>Un node d'insertion de code C++ pour la catégorie GRAFCET[cite: 18, 26].</p>
    <h3>Détails</h3>
    <dl class="message-properties">
        <dt>Emplacement</dt>
        <dd>Permet de catégoriser le bloc de code (Variables, Functions, SetupUp, SetupDown, LoopUp, LoopDown, define).</dd>
        <dt>Code</dt>
        <dd>Éditeur de code intégré avec coloration syntaxique C++[cite: 26].</dd>
    </dl>
</script>
