<script type="text/javascript">
    RED.nodes.registerType('etape', {
        category: 'GRAFCET', // Placé dans la catégorie GRAFCET
        color: '#DDAA99', // Couleur du nœud [cite: 1, 2]
        defaults: {
            name: { value: "" }, 
            etatInitial: { value: false }, // Faux par défaut [cite: 1]
            description: { value: "" },
            outputs: { value: 4 }
        },
        inputs: 1, // 1 entrée [cite: 1, 2]
        outputs: 4, // 4 sorties [cite: 1, 2]
        icon: function() {
            // Icône dynamique selon l'état de la case "État initial" 
            return this.etatInitial ? "font-awesome/fa-star" : "font-awesome/fa-star-o";
        },
        label: function() {
            return this.name || "Etape";
        },
        paletteLabel: "Etape",
        outputLabels: function(index) {
            // Libellés personnalisés pour chacune des 4 sorties [cite: 1, 16]
            var labels = [
                "Activation",
                "Principale",
                "Desactivation",
                "Conditions"
            ];
            return labels[index];
        },
        onadd: function() {
            var node = this;
            
            if (node.name) {
                return;
            }

            // Initialisé à -1 pour que le premier nœud créé soit nommé "0" [cite: 19]
            var maxNumber = -1;
            
            // Recherche du plus grand index numérique existant [cite: 19]
            RED.nodes.eachNode(function(n) {
                if (n.type === 'etape' && n.id !== node.id && n.name) {
                    var num = parseInt(n.name, 10);
                    if (!isNaN(num) && num > maxNumber) {
                        maxNumber = num;
                    }
                }
            });

            // Attribution du nom (max + 1) 
            node.name = String(maxNumber + 1);
            
            RED.nodes.dirty(true);
            RED.view.redraw();
        }
    });
</script>

<script type="text/html" data-template-name="etape">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Nom</label>
        <input type="text" id="node-input-name" placeholder="Nom de l'étape">
    </div>

    <div class="form-row">
        <label for="node-input-etatInitial"><i class="fa fa-toggle-on"></i> État initial</label>
        <input type="checkbox" id="node-input-etatInitial" style="display: inline-block; width: auto; vertical-align: top;">
    </div>

    <div class="form-row">
        <label for="node-input-description"><i class="fa fa-comment"></i> Description</label>
        <textarea id="node-input-description" rows="4" style="width: 100%;" placeholder="Description de l'étape..."></textarea>
    </div>
</script>

<script type="text/html" data-help-name="etape">
    <p>Un nœud d'étape personnalisé pour les structures GRAFCET, commençant sa numérotation à 0[cite: 19].</p>
    <h3>Sorties</h3>
    <ol class="node-ports">
        <li>Activation</li>
        <li>Principale</li>
        <li>Désactivation</li>
        <li>Conditions</li>
    </ol>
</script>
