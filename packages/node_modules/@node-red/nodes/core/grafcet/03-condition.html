<script type="text/javascript">
    // Fonction utilitaire pour générer le résumé classique (utilisé pour la propriété 'name')
    function genererResumeName(node) {
        var parts = [];
        // Choix du séparateur selon la valeur de la checkbox 'OU'
        var separator = node.ou ? " | " : " & ";

        // 1. Conditions
        if (node.conditions) {
            parts.push(node.conditions);
        }

        // 2. Time (ex: T=4min)
        if (node.timeValue && node.timeValue != 0) {
            parts.push("T=" + node.timeValue + node.timeUnit);
        }

        // 3. Compteurs
        if (node.compteurMax) {
            parts.push("compteurMax");
        }
        if (node.nonCompteurMax) {
            parts.push("!compteurMax");
        }

        // 4. Étapes (Etp1 à Etp4) avec gestion du négatif (ex: -5 devient !5)
        var etps = [];
        [node.Etp1, node.Etp2, node.Etp3, node.Etp4].forEach(function(val) {
            if (val !== undefined && val !== null && val !== "") {
                var num = parseFloat(val);
                if (num < 0) {
                    etps.push("!" + Math.abs(num));
                } else {
                    etps.push(num);
                }
            }
        });
        
        if (etps.length > 0) {
            parts.push("Etp(" + etps.join(",") + ")");
        }

        var labelLeft = parts.join(separator);

        // 5. Actions (Action & raz_compteur après le >>)
        var actionParts = [];
        if (node.action) {
            actionParts.push(node.action);
        }
        if (node.raz_compteur) {
            actionParts.push("raz_compteur");
        }

        var labelRight = actionParts.join(" & ");

        var labelText = labelLeft;
        if (labelRight) {
            if (labelText) {
                labelText += " >> " + labelRight;
            } else {
                labelText = ">> " + labelRight;
            }
        }

        return labelText || "Condition";
    }

    // Fonction de calcul en temps réel pour le champ cmd1
    function calculerCmd1() {
        var parts = [];
        // Choix du séparateur selon l'état de la checkbox 'OU'
        var separator = $("#node-input-ou").is(":checked") ? " || " : " && ";

        // 1. Conditions
        var condVal = $("#node-input-conditions").val() || "";
        if (condVal.trim() !== "") {
            parts.push(condVal.trim());
        }

        // Calcule timeMs intermédiaire pour <t>
        var val = parseFloat($("#node-input-timeValue").val()) || 0;
        var unit = $("#node-input-timeUnit").val();
        var multiplier = 1;
        switch (unit) {
            case "sec": multiplier = 1000; break;
            case "min": multiplier = 60000; break;
            case "H":   multiplier = 3600000; break;
            case "ms":
            default:    multiplier = 1; break;
        }
        var computedTimeMs = val * multiplier;

        // 2. E[<n>].time(<t>)
        if (computedTimeMs > 0) {
            parts.push("E[<n>].time(" + computedTimeMs + ")");
        }

        // 3. E[<n>].compteur_atteint()
        if ($("#node-input-compteurMax").is(":checked")) {
            parts.push("E[<n>].compteur_atteint()");
        }

        // 4. !E[<n>].compteur_atteint()
        if ($("#node-input-nonCompteurMax").is(":checked")) {
            parts.push("!E[<n>].compteur_atteint()");
        }

        // 5. E[<s>].est_active() ou !E[<s>].est_active() si négatif
        var e1 = $("#node-input-Etp1").val();
        var e2 = $("#node-input-Etp2").val();
        var e3 = $("#node-input-Etp3").val();
        var e4 = $("#node-input-Etp4").val();
        var inputs = [e1, e2, e3, e4];

        inputs.forEach(function(val) {
            if (val !== undefined && val !== null && val !== "") {
                var num = parseFloat(val);
                if (num < 0) {
                    parts.push("!E[" + Math.abs(num) + "].est_active()");
                } else {
                    parts.push("E[" + num + "].est_active()");
                }
            }
        });

        var finalCmd1 = parts.join(separator);
        $("#node-input-cmd1").val(finalCmd1);
    }

    // Fonction de calcul en temps réel pour le champ cmd2
    function calculerCmd2() {
        var parts = [];

        // 1. E[<n>].raz_compteur();
        if ($("#node-input-raz_compteur").is(":checked")) {
            parts.push("E[<n>].raz_compteur();");
        }

        // 2. Action
        var actionVal = $("#node-input-action").val() || "";
        if (actionVal.trim() !== "") {
            parts.push(actionVal.trim());
        }

        var finalCmd2 = parts.join(" ");
        $("#node-input-cmd2").val(finalCmd2);
    }

    // Exécute les calculs de toutes les commandes
    function calculerCommandes() {
        calculerCmd1();
        calculerCmd2();
    }

    RED.nodes.registerType('Condition', {
        category: 'GRAFCET',
        color: '#FFF0F0',
        defaults: {
            name: { value: "" },
            customName: { value: "" },
            conditions: { value: "", required: true },
            timeValue: { value: 0, validate: RED.validators.number() },
            timeUnit: { value: "ms" },
            timeMs: { value: 0 },
            compteurMax: { value: false },
            nonCompteurMax: { value: false },
            raz_compteur: { value: false },
            Etp1: { value: "" },
            Etp2: { value: "" },
            Etp3: { value: "" },
            Etp4: { value: "" },
            action: { value: "" },
            ou: { value: false },
            cmd1: { value: "" },
            cmd2: { value: "" }
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-map-signs",
        label: function() {
            return this.customName || genererResumeName(this);
        },
        oneditprepare: function() {
            // 1. Gestion de l'exclusion mutuelle
            $("#node-input-compteurMax").on("change", function() {
                if ($(this).is(":checked")) {
                    $("#node-input-nonCompteurMax").prop("checked", false);
                }
                calculerCommandes();
            });
            $("#node-input-nonCompteurMax").on("change", function() {
                if ($(this).is(":checked")) {
                    $("#node-input-compteurMax").prop("checked", false);
                }
                calculerCommandes();
            });

            // 2. Liaison des événements pour mettre à jour les commandes en temps réel
            $("#node-input-conditions").on("input", calculerCommandes);
            $("#node-input-timeValue").on("input", calculerCommandes);
            $("#node-input-timeUnit").on("change", calculerCommandes);
            $("#node-input-raz_compteur").on("change", calculerCommandes);
            $("#node-input-Etp1, #node-input-Etp2, #node-input-Etp3, #node-input-Etp4").on("input", calculerCommandes);
            $("#node-input-action").on("input", calculerCommandes);
            $("#node-input-ou").on("change", calculerCommandes);

            // Premier calcul à l'ouverture de l'éditeur
            calculerCommandes();
        },
        oneditsave: function() {
            // Calcul de timeMs final
            var val = parseFloat($("#node-input-timeValue").val()) || 0;
            var unit = $("#node-input-timeUnit").val();
            var multiplier = 1;
            switch (unit) {
                case "sec": multiplier = 1000; break;
                case "min": multiplier = 60000; break;
                case "H":   multiplier = 3600000; break;
                case "ms":
                default:    multiplier = 1; break;
            }
            this.timeMs = val * multiplier;

            // Recalculer et sauvegarder cmd1 et cmd2
            calculerCommandes();
            this.cmd1 = $("#node-input-cmd1").val();
            this.cmd2 = $("#node-input-cmd2").val();

            // Auto-remplissage du "name" classique
            var inputCustomName = $("#node-input-customName").val().trim();
            if (inputCustomName !== "") {
                this.name = inputCustomName;
            } else {
                var tempNode = {
                    conditions: $("#node-input-conditions").val(),
                    timeValue: val,
                    timeUnit: unit,
                    compteurMax: $("#node-input-compteurMax").is(":checked"),
                    nonCompteurMax: $("#node-input-nonCompteurMax").is(":checked"),
                    raz_compteur: $("#node-input-raz_compteur").is(":checked"),
                    Etp1: $("#node-input-Etp1").val(),
                    Etp2: $("#node-input-Etp2").val(),
                    Etp3: $("#node-input-Etp3").val(),
                    Etp4: $("#node-input-Etp4").val(),
                    action: $("#node-input-action").val(),
                    ou: $("#node-input-ou").is(":checked")
                };
                this.name = genererResumeName(tempNode);
            }
        }
    });
</script>

<script type="text/html" data-template-name="Condition">
    <div class="form-row" style="display: flex; flex-direction: column; margin-bottom: 15px;">
        <label for="node-input-conditions" style="width: 100%; margin-bottom: 5px;"><i class="fa fa-code"></i> Conditions</label>
        <input type="text" id="node-input-conditions" style="width: 100%;">
    </div>

    <div class="form-row">
        <label for="node-input-timeValue"><i class="fa fa-clock-o"></i> Time</label>
        <input type="number" id="node-input-timeValue" style="width: 50% !important; display: inline-block;">
        <select id="node-input-timeUnit" style="width: 20% !important; display: inline-block;">
            <option value="ms">ms</option>
            <option value="sec">sec</option>
            <option value="min">min</option>
            <option value="H">H</option>
        </select>
    </div>

    <div class="form-row" style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
        <div style="display: flex; align-items: center;">
            <input type="checkbox" id="node-input-compteurMax" style="display: inline-block; width: auto; margin: 0 5px 0 0;">
            <label for="node-input-compteurMax" style="width: auto; margin: 0;">compteurMax</label>
        </div>
        <div style="display: flex; align-items: center;">
            <input type="checkbox" id="node-input-nonCompteurMax" style="display: inline-block; width: auto; margin: 0 5px 0 0;">
            <label for="node-input-nonCompteurMax" style="width: auto; margin: 0;">!compteurMax</label>
        </div>
        <div style="display: flex; align-items: center;">
            <input type="checkbox" id="node-input-raz_compteur" style="display: inline-block; width: auto; margin: 0 5px 0 0;">
            <label for="node-input-raz_compteur" style="width: auto; margin: 0;">raz_compteur</label>
        </div>
        <div style="display: flex; align-items: center; border-left: 1px solid #ccc; padding-left: 10px;">
            <input type="checkbox" id="node-input-ou" style="display: inline-block; width: auto; margin: 0 5px 0 0;">
            <label for="node-input-ou" style="width: auto; margin: 0; font-weight: bold;">OU</label>
        </div>
    </div>

    <div style="margin-bottom: 5px;">
        <span style="font-size: 11px; color: #666; font-style: italic;"><i class="fa fa-info-circle"></i> Étapes (valeur négative = inverse logique !)</span>
    </div>
    <div class="form-row" style="display: flex; gap: 15px; align-items: center;">
        <div style="display: flex; align-items: center; gap: 5px;">
            <label for="node-input-Etp1" style="width: auto; margin: 0;">Etp1</label>
            <input type="number" id="node-input-Etp1" min="-999" max="999" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4); calculerCommandes();" style="width: 65px !important; text-align: center; padding: 0 5px;">
        </div>
        <div style="display: flex; align-items: center; gap: 5px;">
            <label for="node-input-Etp2" style="width: auto; margin: 0;">Etp2</label>
            <input type="number" id="node-input-Etp2" min="-999" max="999" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4); calculerCommandes();" style="width: 65px !important; text-align: center; padding: 0 5px;">
        </div>
        <div style="display: flex; align-items: center; gap: 5px;">
            <label for="node-input-Etp3" style="width: auto; margin: 0;">Etp3</label>
            <input type="number" id="node-input-Etp3" min="-999" max="999" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4); calculerCommandes();" style="width: 65px !important; text-align: center; padding: 0 5px;">
        </div>
        <div style="display: flex; align-items: center; gap: 5px;">
            <label for="node-input-Etp4" style="width: auto; margin: 0;">Etp4</label>
            <input type="number" id="node-input-Etp4" min="-999" max="999" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4); calculerCommandes();" style="width: 65px !important; text-align: center; padding: 0 5px;">
        </div>
    </div>

    <div class="form-row">
        <label for="node-input-action"><i class="fa fa-play-circle"></i> Action</label>
        <input type="text" id="node-input-action">
    </div>

    <div class="form-row" style="margin-top: 15px;">
        <label for="node-input-customName"><i class="fa fa-tag"></i> Nom</label>
        <input type="text" id="node-input-customName" placeholder="Nom (laisser vide pour résumé automatique)">
    </div>

    <hr style="margin: 15px 0; border: 0; border-top: 1px solid #ccc;">

    <div class="form-row" style="display: flex; flex-direction: column;">
        <label for="node-input-cmd1" style="width: 100%; margin-bottom: 5px;"><i class="fa fa-terminal"></i> cmd1</label>
        <input type="text" id="node-input-cmd1" readonly style="width: 100%; background-color: #f0f0f0; cursor: not-allowed; color: #555;">
    </div>

    <div class="form-row" style="display: flex; flex-direction: column; margin-top: 10px;">
        <label for="node-input-cmd2" style="width: 100%; margin-bottom: 5px;"><i class="fa fa-terminal"></i> cmd2</label>
        <input type="text" id="node-input-cmd2" readonly style="width: 100%; background-color: #f0f0f0; cursor: not-allowed; color: #555;">
    </div>
</script>

<script type="text/html" data-help-name="Condition">
    <p>Un nœud GRAFCET pour évaluer des conditions complexes. Les valeurs négatives pour les étapes s'inversent logiquement.</p>
</script>
