<script type="text/javascript">
    RED.nodes.registerType('goto', {
        category: 'GRAFCET',
        color: '#DDAA99',
        defaults: {
            name: { value: "", validate: RED.validators.number(), required: true },
            activation: { value: true },
            principale: { value: false },
            desactivation: { value: false },
            raz_compteur: { value: false },
            cmd: { value: "" }
        },
        inputs: 1,
        outputs: 0,
        icon: function() {
            if (this.activation) { return "font-awesome/fa-level-up"; }
            if (this.principale) { return "font-awesome/fa-long-arrow-right"; }
            if (this.desactivation) { return "font-awesome/fa-level-down"; }
            return "font-awesome/fa-level-up";
        },
        align: "right",
        label: function() {
            var n = this.name || "GoTo";
            return this.raz_compteur ? n + " R" : n;
        },
        oneditprepare: function() {
            var node = this;

            function getEtape() {
                return $("#node-input-name").val() || "";
            }

            function getMode() {
                if ($("#node-input-activation").prop("checked")) { return "activation"; }
                if ($("#node-input-principale").prop("checked")) { return "principale"; }
                if ($("#node-input-desactivation").prop("checked")) { return "desactivation"; }
                return "";
            }

            function genererCmd() {
                var n = getEtape();
                var mode = getMode();
                var cmd = "";
                if ($("#node-input-raz_compteur").prop("checked")) {
                    cmd = "E[" + n + "].raz_compteur(); ";
                }
                if (mode === "activation") { return cmd + "E[" + n + "].on();"; }
                if (mode === "principale") { return cmd + "E[" + n + "].set_B_ETAT();"; }
                if (mode === "desactivation") { return cmd + "E[" + n + "].off();"; }
                return cmd;
            }

            function updateCmd() {
                $("#node-input-cmd").val(genererCmd());
                RED.nodes.dirty(true);
            }

            function synchroniserCheckboxes(checkedId) {
                var checkboxes = ["node-input-activation", "node-input-principale", "node-input-desactivation"];
                checkboxes.forEach(function(id) {
                    if (id !== checkedId) { $("#" + id).prop("checked", false); }
                });
                updateCmd();
            }

            $("#node-input-activation").on("change", function() {
                if (this.checked) { synchroniserCheckboxes("node-input-activation"); }
                else if (!$("#node-input-principale").prop("checked") && !$("#node-input-desactivation").prop("checked")) {
                    $(this).prop("checked", true);
                }
                updateCmd();
            });

            $("#node-input-principale").on("change", function() {
                if (this.checked) { synchroniserCheckboxes("node-input-principale"); }
                else if (!$("#node-input-activation").prop("checked") && !$("#node-input-desactivation").prop("checked")) {
                    $(this).prop("checked", true);
                }
                updateCmd();
            });

            $("#node-input-desactivation").on("change", function() {
                if (this.checked) { synchroniserCheckboxes("node-input-desactivation"); }
                else if (!$("#node-input-activation").prop("checked") && !$("#node-input-principale").prop("checked")) {
                    $(this).prop("checked", true);
                }
                updateCmd();
            });

            $("#node-input-name").on("input", function() {
                updateCmd();
            });

            $("#node-input-raz_compteur").on("change", function() {
                updateCmd();
            });

            updateCmd();
        },
        oneditsave: function() {
            this.activation = $("#node-input-activation").prop("checked");
            this.principale = $("#node-input-principale").prop("checked");
            this.desactivation = $("#node-input-desactivation").prop("checked");
            this.raz_compteur = $("#node-input-raz_compteur").prop("checked");
            this.cmd = $("#node-input-cmd").val();
        }
    });
</script>

<script type="text/html" data-template-name="goto">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-hashtag"></i> Etape</label>
        <input type="text" id="node-input-name" placeholder="Numéro de l'étape">
    </div>
    <div class="form-row" style="display: flex; align-items: center; gap: 20px;">
        <div style="display: flex; align-items: center;">
            <input type="checkbox" id="node-input-activation"
                   style="display: inline-block; width: auto; margin: 0 5px 0 0;">
            <label for="node-input-activation" style="width: auto; margin: 0;">Activation</label>
        </div>
        <div style="display: flex; align-items: center;">
            <input type="checkbox" id="node-input-principale"
                   style="display: inline-block; width: auto; margin: 0 5px 0 0;">
            <label for="node-input-principale" style="width: auto; margin: 0;">Principale</label>
        </div>
        <div style="display: flex; align-items: center;">
            <input type="checkbox" id="node-input-desactivation"
                   style="display: inline-block; width: auto; margin: 0 5px 0 0;">
            <label for="node-input-desactivation" style="width: auto; margin: 0;">Desactivation</label>
        </div>
    </div>
    <div class="form-row" style="display: flex; align-items: center; gap: 20px;">
        <div style="display: flex; align-items: center;">
            <input type="checkbox" id="node-input-raz_compteur"
                   style="display: inline-block; width: auto; margin: 0 5px 0 0;">
            <label for="node-input-raz_compteur" style="width: auto; margin: 0;">raz_compteur</label>
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-cmd"><i class="fa fa-terminal"></i> cmd</label>
        <input type="text" id="node-input-cmd" readonly
               style="width: 100%; background-color: #f0f0f0; cursor: not-allowed; color: #555;">
    </div>
</script>

<script type="text/html" data-help-name="goto">
    <p>Nœud <strong>GoTo</strong> dans la catégorie <strong>GRAFCET</strong>.</p>
    <h3>Détails</h3>
    <p>Permet de sélectionner le mode de transition d'une étape :</p>
    <ul>
        <li><strong>Activation</strong> : <code>E[&lt;n&gt;].on();</code></li>
        <li><strong>Principale</strong> : <code>E[&lt;n&gt;].set_B_ETAT();</code></li>
        <li><strong>Desactivation</strong> : <code>E[&lt;n&gt;].off();</code></li>
    </ul>
    <p>Si <strong>raz_compteur</strong> est coché, <code>E[&lt;n&gt;].raz_compteur();</code> est ajouté avant la commande.</p>
    <p>Le label affiche <strong>R</strong> à côté du numéro si raz_compteur est activé.</p>
    <p>Le champ <strong>cmd</strong> est généré automatiquement et est en lecture seule.</p>
</script>
